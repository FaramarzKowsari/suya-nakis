<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Page Not Found | Suya Nakış</title>
  <link rel="icon" type="image/svg+xml" href="/suya-nakis/favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #032f2d;
      --surface: #092f38;
      --text: #f8fafc;
      --muted: #b7d0cb;
      --accent: #5eead4;
      --gold: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(94, 234, 212, .20), transparent 34%),
        radial-gradient(circle at 85% 85%, rgba(250, 204, 21, .12), transparent 28%),
        var(--bg);
    }

    main {
      width: min(680px, 100%);
      padding: clamp(32px, 7vw, 64px);
      text-align: center;
      background: rgba(9, 47, 56, .82);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 30px;
      box-shadow: 0 30px 90px rgba(0,0,0,.36);
    }

    .code {
      margin: 0;
      color: var(--accent);
      font-size: clamp(4.5rem, 18vw, 8rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -.06em;
    }

    h1 {
      margin: 16px 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
    }

    p {
      margin: 0 auto 28px;
      max-width: 520px;
      color: var(--muted);
      line-height: 1.75;
    }

    a {
      display: inline-block;
      padding: 13px 20px;
      color: #032f2d;
      font-weight: 900;
      text-decoration: none;
      background: var(--accent);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <main>
    <p class="code" aria-hidden="true">404</p>
    <h1>Page not found</h1>
    <p>
      The requested page may have moved or the address may be incomplete.
      Return to the interactive digital Ebru studio.
    </p>
    <a href="/suya-nakis/">Return to Suya Nakış</a>
  </main>
</body>
</html>
